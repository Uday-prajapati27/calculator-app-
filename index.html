<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator + Rapid Math Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <main class="app-shell" id="main">
    <section class="calculator-card">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">∑</div>
          <div>
            <p class="eyebrow">Smart Utility</p>
            <h1>Calculator</h1>
          </div>
        </div>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon">◐</span>
        </button>
      </div>

      <div class="display-wrap">
        <label for="display" class="sr-only">Calculator display</label>
        <input type="text" id="display" readonly placeholder="0" />
        <div class="display-subtext">
          <span id="calcHint">Ready</span>
          <button class="mini-action" id="openGameBtn" type="button">Play Math Game</button>
        </div>
      </div>

      <div class="buttons">
        <button class="btn operator" onclick="clearDisplay()">C</button>
        <button class="btn operator" onclick="deleteLast()">DEL</button>
        <button class="btn operator" onclick="appendValue('%')">%</button>
        <button class="btn operator" onclick="appendValue('/')">÷</button>

        <button class="btn" onclick="appendValue('7')">7</button>
        <button class="btn" onclick="appendValue('8')">8</button>
        <button class="btn" onclick="appendValue('9')">9</button>
        <button class="btn operator" onclick="appendValue('*')">×</button>

        <button class="btn" onclick="appendValue('4')">4</button>
        <button class="btn" onclick="appendValue('5')">5</button>
        <button class="btn" onclick="appendValue('6')">6</button>
        <button class="btn operator" onclick="appendValue('-')">−</button>

        <button class="btn" onclick="appendValue('1')">1</button>
        <button class="btn" onclick="appendValue('2')">2</button>
        <button class="btn" onclick="appendValue('3')">3</button>
        <button class="btn operator" onclick="appendValue('+')">+</button>

        <button class="btn zero" onclick="appendValue('0')">0</button>
        <button class="btn" onclick="appendValue('.')">.</button>
        <button class="btn equal" onclick="calculateResult()">=</button>
      </div>
    </section>
  </main>

  <dialog id="gameDialog" class="game-dialog">
    <div class="game-panel">
      <div class="game-header">
        <div>
          <p class="eyebrow">Rapid Challenge</p>
          <h2>Math Game</h2>
        </div>
        <button class="close-btn" id="closeGameBtn" aria-label="Close game">✕</button>
      </div>

      <div class="game-stats">
        <div class="stat-box">
          <span>Round</span>
          <strong id="roundInfo">1 / 5</strong>
        </div>
        <div class="stat-box">
          <span>Score</span>
          <strong id="scoreInfo">0</strong>
        </div>
      </div>

      <div id="gameScreen" class="game-screen">
        <p class="game-intro">
          Answer 5 quick basic calculation questions. Each question has 3 options.
        </p>
        <button class="start-game-btn" id="startGameBtn">Start Game</button>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
